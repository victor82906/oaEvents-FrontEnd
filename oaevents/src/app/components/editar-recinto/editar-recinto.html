<div class="layout-container">
  <app-cabecera></app-cabecera>

  <main class="main-content">
    <!-- El panel de administración va aquí, como un hermano del contenedor del form -->
    <app-panel-administracion></app-panel-administracion>

    <!-- Este nuevo div envuelve solo el formulario para centrarlo correctamente -->
    <div class="form-container">
      <div class="card p-4 p-md-5 shadow-lg edit-card">

        @if (cargando) {
          <div class="spinner-overlay">
            <div class="spinner"></div>
          </div>
        }

        <div class="text-center mb-4">
          <h2 class="fw-bold text-primary-custom">Editar Datos del Recinto</h2>
          <p class="text-muted">Actualiza la información general del recinto Olivo Arena</p>
        </div>

        <form [formGroup]="editarRecintoForm" (ngSubmit)="editar()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="nombre" class="form-label fw-bold">Nombre del Recinto</label>
              <input type="text" id="nombre" class="form-control custom-input" formControlName="nombre">
            </div>
            <div class="col-md-6 mb-3">
              <label for="telefono" class="form-label fw-bold">Teléfono</label>
              <input type="text" id="telefono" class="form-control custom-input" formControlName="telefono">
            </div>
          </div>

          <div class="form-group mb-3">
            <label for="email" class="form-label fw-bold">Correo Electrónico de Contacto</label>
            <input type="email" id="email" class="form-control custom-input" formControlName="email">
          </div>

          <div class="form-group mb-3">
            <label for="ubicacion" class="form-label fw-bold">Ubicación</label>
            <input type="text" id="ubicacion" class="form-control custom-input" formControlName="ubicacion">
          </div>

          <div class="form-group mb-4">
            <label for="mapa" class="form-label fw-bold">SVG ViewBox del Mapa</label>
            <textarea id="mapa" class="form-control custom-input" formControlName="mapa" rows="4"></textarea>
            <div class="form-text">
              Introduce las coordenadas del atributo viewBox del SVG del mapa del recinto.
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2" [disabled]="editarRecintoForm.invalid || cargando">
            <span class="fw-bold">GUARDAR CAMBIOS</span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>

<app-modal-error #modalError></app-modal-error>
<app-modal-exito #modalExito></app-modal-exito>
