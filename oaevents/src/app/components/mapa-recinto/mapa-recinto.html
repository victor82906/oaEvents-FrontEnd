<div class="mapa-recinto-container">
  @if (!cargando && recinto) {

    <div class="cabecera-mapa">
      <!-- Botón de volver atrás (solo visible si estamos viendo asientos) -->
      @if (modoAsientos) {
        <button class="btn-volver" (click)="volverAZonas()">
          <span class="material-symbols-outlined">arrow_back</span> Volver a zonas
        </button>
      }
      <h2>{{ recinto.nombre }}</h2>
    </div>

    <div class="svg-container">
      <svg [attr.viewBox]="recinto.mapa" preserveAspectRatio="xMidYMid meet">

        <!-- VISTA 1: ZONAS -->
        @if (!modoAsientos) {
          @for (zona of zonas; track zona.id) {
            <!-- Polígono de la zona -->
            <polygon
              [attr.points]="zona.coordenadas"
              [attr.fill]="selectedZona?.id === zona.id ? 'var(--primary-color-hover)' : 'var(--primary-color)'"
              class="zona-polygon"
              (click)="onZonaClick(zona)"
            ></polygon>

            <!-- Texto centrado con el número de zona -->
            <text
              [attr.x]="centrosZonas[zona.id]?.x"
              [attr.y]="centrosZonas[zona.id]?.y"
              class="texto-zona"
              (click)="onZonaClick(zona)"
            >
              {{ zona.numero }}
            </text>
          }
        }

        <!-- VISTA 2: ASIENTOS -->
        @if (modoAsientos && selectedZona) {
          <!-- Fondo de referencia opcional: pintar la zona seleccionada muy clarita de fondo -->
          <polygon
            [attr.points]="selectedZona.coordenadas"
            fill="#f0f0f0"
            stroke="#ccc"
          ></polygon>

          @for (loc of localidades; track loc.id) {
            @if (loc.posX !== 0 || loc.posY !== 0) {
              <!-- Cuadrado del asiento -->
              <rect
                [attr.x]="loc.posX"
                [attr.y]="loc.posY"
                width="40"
                height="40"
                rx="2"
                ry="2"
                class="localidad-asiento"
                fill="white"
              >
                <title>Fila: {{loc.fila}} - Asiento: {{loc.numero}}</title>
              </rect>

              <!-- Número del asiento (centrado justo encima del cuadrado) -->
                <!-- Sumamos 5 a la X para centrar el texto respecto al cuadrado de ancho 10 -->

            }
          }
        }

      </svg>
    </div>

    <!-- Panel de información si es Pista/Frontstage -->
    @if (selectedZona && !modoAsientos && (selectedZona.numero.includes('PISTA') || selectedZona.numero.includes('FRONT'))) {
      <div class="info-pista">
        <p>Has seleccionado <strong>{{selectedZona.numero}}</strong> (Zona de pie)</p>
        <button class="btn-comprar">Seleccionar Entrada</button>
      </div>
    }

  } @else {
    <p>Cargando mapa del recinto...</p>
  }
</div>
