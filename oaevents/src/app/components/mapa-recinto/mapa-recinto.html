<div class="layout-container">
  <app-cabecera></app-cabecera>

  <main class="main-content">
    @if (recinto) {
      <h2 class="mb-4 fw-bold text-primary-custom">{{ recinto.nombre }}</h2>
    }

    <div class="mapa-container">

      <div class="controles-mapa">
        @if (selectedZona) {
          <button class="btn btn-secondary-custom" (click)="volverAVistaGeneral()">
            <i class="bi bi-arrow-left me-2"></i>
            Volver a Zonas
          </button>
        }
      </div>

      @if (cargando) {
        <div class="spinner-overlay">
          <div class="spinner"></div>
        </div>
      }

      <div class="aspect-ratio-box" [style.paddingBottom]="aspectRatioStyle">
        @if (recinto) {
          <svg [attr.viewBox]="viewBoxDinamico">

            @if (!selectedZona || selectedZona.pista) {
              <g id="zonas-layer">
                @for (zona of zonas; track zona.id) {
                  <g class="zona-group" (click)="onZonaClick(zona)">
                    <polygon
                      [attr.points]="zona.coordenadas"
                      [attr.fill]="selectedZona?.id === zona.id ? 'var(--primary-color-hover)' : 'var(--primary-color)'"
                      class="zona-polygon">
                    </polygon>
                    @if (centrosZonas[zona.id]) {
                      <text
                        [attr.x]="centrosZonas[zona.id].x"
                        [attr.y]="centrosZonas[zona.id].y"
                        class="zona-texto">
                        {{ zona.numero }}
                      </text>
                    }
                  </g>
                }
              </g>
            }

            @if (selectedZona && !selectedZona.pista && localidades.length > 0) {
              <g id="localidades-layer">

                @for (fila of filasInfo; track fila.numero) {
                  <text
                    [attr.x]="fila.minX + (TAMANO_LOCALIDAD / 2)"
                    [attr.y]="fila.y + TAMANO_LOCALIDAD / 2"
                    class="fila-texto"
                    text-anchor="start">
                    F{{ fila.numero }}
                  </text>
                  <text
                    [attr.x]="fila.maxX - (TAMANO_LOCALIDAD / 2)"
                    [attr.y]="fila.y + TAMANO_LOCALIDAD / 2"
                    class="fila-texto"
                    text-anchor="end">
                    F{{ fila.numero }}
                  </text>
                }

                @for (localidad of localidades; track localidad.id) {
                  <g class="localidad-group">
                    <rect
                      [attr.x]="localidad.posX"
                      [attr.y]="localidad.posY"
                      [attr.width]="TAMANO_LOCALIDAD"
                      [attr.height]="TAMANO_LOCALIDAD"
                      [attr.rx]="5"
                      [attr.ry]="5"
                      fill="var(--secondary-color)"
                      class="localidad-rect">
                    </rect>
                    <text
                      [attr.x]="localidad.posX + (TAMANO_LOCALIDAD / 2)"
                      [attr.y]="localidad.posY + (TAMANO_LOCALIDAD / 2)"
                      class="localidad-texto">
                      {{ localidad.numero }}
                    </text>
                  </g>
                }
              </g>
            }
          </svg>
        } @else if (!cargando) {
          <div class="alert alert-warning text-center">
            No se pudo cargar la información del recinto.
          </div>
        }
      </div>

      @if (infoZonaPista) {
        <div class="info-pista mx-auto mt-4">
          <h4>{{ infoZonaPista.nombre }}</h4>
          <p class="mb-0">Aforo aproximado: <strong>{{ infoZonaPista.aforo }} personas</strong></p>
        </div>
      }
    </div>
  </main>

  <app-footer></app-footer>
</div>
